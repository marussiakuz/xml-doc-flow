services:
  db:
    image: postgres:16-alpine
    container_name: xml-doc-flow-db
    environment:
      POSTGRES_DB: xml_doc_flow
      POSTGRES_USER: xml_doc_flow
      POSTGRES_PASSWORD: xml_doc_flow
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: xml-doc-flow-backend
      dockerfile: services/app/Dockerfile
    container_name: xml-doc-flow-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/xml_doc_flow
      SPRING_DATASOURCE_USERNAME: xml_doc_flow
      SPRING_DATASOURCE_PASSWORD: xml_doc_flow
      PORT: 8080
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost:8888,http://127.0.0.1:8888,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080}
    ports:
      - "8080:8080"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: xml-doc-flow-backend/docker/web/Dockerfile
    container_name: xml-doc-flow-web
    ports:
      - "8888:80"
    depends_on:
      - app

volumes:
  pgdata:
