services:
  db:
    image: postgres:16-alpine
    container_name: xml-doc-flow-db
    environment:
      POSTGRES_DB: xml_doc_flow
      POSTGRES_USER: xml_doc_flow
      POSTGRES_PASSWORD: xml_doc_flow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: services/app/Dockerfile
    container_name: xml-doc-flow-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/xml_doc_flow
      SPRING_DATASOURCE_USERNAME: xml_doc_flow
      SPRING_DATASOURCE_PASSWORD: xml_doc_flow
      PORT: 8080
      APP_STORAGE_XML_ROOT: /data/xml-documents
    ports:
      - "8080:8080"
    volumes:
      - app-xml:/data/xml-documents
    depends_on:
      - db

volumes:
  pgdata:
  app-xml:
