server:
  port: ${PORT:8080}

# Часовой пояс для бизнес-времени (LocalDateTime.now(zone)) и Jackson
app:
  time-zone: Europe/Moscow
  seed:
    test-username: ${APP_SEED_TEST_USERNAME:test}
    test-password: ${APP_SEED_TEST_PASSWORD:test}
    # Пароль для тестовых пользователей contractor/customer.
    # По умолчанию НЕ "password", чтобы Chrome не ругался на утечки.
    demo-password: ${APP_SEED_DEMO_PASSWORD:artwell-local-2026!}
    organization-inn: ${APP_SEED_ORG_INN:0000000000}

spring:
  jackson:
    time-zone: ${app.time-zone:Europe/Moscow}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xml_doc_flow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:iamroot}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # TODO: заменить на Flyway + ddl-auto: validate перед выходом в production
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

